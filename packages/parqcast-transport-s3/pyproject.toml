[project]
name = "parqcast-transport-s3"
version = "0.1.0"
description = "S3 transport for parqcast — supports AWS S3 and S3-compatible stores (MinIO, LocalStack)"
requires-python = "==3.12.3"
license = "Apache-2.0"
dependencies = [
    "parqcast-core>=0.1.0",
    "boto3>=1.35",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parqcast"]
